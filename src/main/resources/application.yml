spring:
  application:
    name: prod-clearance-service
  profiles:
    active: dev
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/prod_clearance}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 3
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      linger.ms: 10
      batch.size: 16384

logging:
  level:
    root: INFO
    com.company.prodclearance: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  config: classpath:logback-spring.xml

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

app:
  poll:
    interval-seconds: ${POLL_INTERVAL_SECONDS:30}
    batch-size: ${BATCH_SIZE:100}
  kafka:
    topic: ${KAFKA_TOPIC:prod.clearance.output}
    partition: 0
  retry:
    max-attempts: ${RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: 1000
    max-delay-ms: 10000
    multiplier: 2.0