version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: prod-clearance-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: prod_clearance
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - prod-clearance-network
    healthcheck:
      test: mongosh -eval "db.version()"
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: prod-clearance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    networks:
      - prod-clearance-network

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: prod-clearance-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    networks:
      - prod-clearance-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server kafka:9092
      interval: 10s
      timeout: 5s
      retries: 5

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: prod-clearance-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "true"
    networks:
      - prod-clearance-network
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prod-clearance-app
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/prod_clearance
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      POLL_INTERVAL_SECONDS: 30
      BATCH_SIZE: 100
      RETRY_MAX_ATTEMPTS: 3
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - prod-clearance-network
    healthcheck:
      test: curl -f http://localhost:8080/api/health/live || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs

volumes:
  mongo_data:

networks:
  prod-clearance-network:
    driver: bridge